<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduReach - Login</title>
    <link rel="stylesheet" href="loginStyle.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $("form").submit(function(){
                alert("Great Job!");
            });
        });
    </script>
</head>
<body>
    <div class="form-box">
        <div class="button-box">
            <div id="btn"></div>
            <button type="button" class="toggle-btn" onclick="login()">Log In</button>
            <button type="button" class="toggle-btn" onclick="register()">Register</button>
        </div>
        <div class="social-icons">
            <img src="images/icon/fb2.png" alt="Facebook">
            <img src="images/icon/insta2.png" alt="Instagram">
            <img src="images/icon/tt2.png" alt="Twitter">
        </div>

        <!-- Login Form -->
        <form id="login" class="input-group" action="index.html">
            <div class="inp">
                <img src="images/icon/user.png" alt="User Icon">
                <input type="text" id="email" class="input-field" placeholder="Username or Phone Number" required>
            </div>
            <div class="inp">
                <img src="images/icon/password.png" alt="Password Icon">
                <input type="password" id="password" class="input-field" placeholder="Password" required>
            </div>
            <input type="checkbox" class="check-box"> Remember Password
            <button type="submit" class="submit-btn">Log In</button>
        </form>

        <div class="other">
            <div class="instead">
                <h3>or</h3>
            </div>
            <button class="connect" onclick="google()">
                <img src="images/icon/google.png" alt="Google Icon"><span>Sign in with Google</span>
            </button>
        </div>

        <!-- Registration Form -->
        <form id="register" class="input-group">
            <input type="text" class="input-field" placeholder="Full Name" required>
            <input type="email" class="input-field" placeholder="Email Address" required>
            <input type="password" class="input-field" placeholder="Create Password" required>
            <input type="password" class="input-field" placeholder="Confirm Password" required>
            <input type="checkbox" class="check-box"> I agree to the Terms & Conditions
            <button type="submit" class="submit-btn reg-btn">Register</button>
        </form>
    </div>
    <script type="text/javascript" src="script.js"></script>
</body>
</html>
